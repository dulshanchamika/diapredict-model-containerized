name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-test.txt
        
    - name: Train model (Generate diabetes_model.pkl)
      run: |
        python train.py
        
    - name: Run tests
      run: |
        pytest test_main.py -v
        
    - name: Upload Trained Model Artifact
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: diabetes_model.pkl

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Trained Model Artifact
      uses: actions/download-artifact@v4
      with:
        name: trained-model
        path: .
        
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
        
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          dulshanchamika/diapredict-model:latest
          dulshanchamika/diapredict-model:${{ github.sha }}
          
    - name: Set up Kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
        
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
        
    - name: Deploy to Kubernetes
      env:
        KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
      run: |
        # Only run deployment if KUBECONFIG is provided in secrets
        if [ -n "$KUBECONFIG_CONTENT" ]; then
          mkdir -p ~/.kube
          echo "$KUBECONFIG_CONTENT" > ~/.kube/config
          
          # Update the deployment file to use the specific image SHA
          sed -i 's|image: dulshanchamika/diapredict-model:.*|image: dulshanchamika/diapredict-model:${{ github.sha }}|' k8s-deploy.yml
          
          # Apply the deployment
          kubectl apply -f k8s-deploy.yml
        else
          echo "No KUBECONFIG secret found. Skipping deployment step."
        fi
